
global
  stats socket /var/run/api.sock user haproxy group haproxy mode 660 level admin expose-fd listeners
  log stdout format raw local0 debug

defaults
  mode http
  timeout client 10s
  timeout connect 5s
  timeout server 10s
  timeout http-request 10s
  timeout tunnel 1h
  log global
  option httplog
  option tcplog
  option logasap

frontend stats
  bind *:8404
  stats enable
  stats uri /
  stats refresh 10s

# Bind * — container IP is set in Terraform; clients use that IP (or DNAT to it).
# Do not hardcode a LAN IP here or HAProxy will fail if it is not on this host.
#
# --- Routing by hostname (abbottland.io) ---
# We match the usual one-label DNS wildcard shape:
#   Non-prod:  <anything>.non-prod.abbottland.io     (example: app.non-prod.abbottland.io)
#   Non-prod internal: <anything>.local.non-prod.abbottland.io (example: podinfo.local.non-prod.abbottland.io)
#   Prod:      <anything>.abbottland.io               (example: app.abbottland.io)
#   Prod internal: <anything>.local.abbottland.io     (example: podinfo.local.abbottland.io)
# Non-prod rules are checked first. Prod host ACLs: internal local.* first, then one-label *.abbottland.io, so
# foo.non-prod.abbottland.io does NOT match prod (the segment after "foo." is non-prod, not abbottland).
#
# Regex cheat sheet (TLS uses req_ssl_sni; HTTP uses hdr(host) — same pattern, Host may include :port).
# Each acl line ends with -i so matching is case-insensitive (Abbottland.io vs abbottland.io).
#   ^ ... $                 entire hostname (or host:port for HTTP)
#   [a-zA-Z0-9-]+           one DNS label — letters, digits, hyphen; no dots
#   \.non-prod\.abbottland\.io  literal .non-prod.abbottland.io
#   \.local\.non-prod\.abbottland\.io  literal .local.non-prod.abbottland.io
#   \.local\.abbottland\.io  literal .local.abbottland.io
#   \.abbottland\.io        literal .abbottland.io
#   (:\d+)?                 optional :443 style port suffix (HTTP only)
frontend frontend-plex
  bind *:8022
  mode tcp
  option tcplog
  tcp-request inspect-delay 5s
  tcp-request content accept if { req_ssl_hello_type 1 }
  # SNI = TLS server name (same hostnames as HTTPS). :443 below repeats these ACLs.
  acl is_nonprod_local_sni req_ssl_sni -m reg -i ^[a-zA-Z0-9-]+\.local\.non-prod\.abbottland\.io$ # *.local.non-prod.abbottland.io
  acl is_nonprod_sni req_ssl_sni -m reg -i ^[a-zA-Z0-9-]+\.non-prod\.abbottland\.io$ # *.non-prod.abbottland.io
  acl is_prod_local_sni req_ssl_sni -m reg -i ^[a-zA-Z0-9-]+\.local\.abbottland\.io$ # *.local.abbottland.io
  acl is_prod_sni req_ssl_sni -m reg -i ^[a-zA-Z0-9-]+\.abbottland\.io$             # *.abbottland.io (not non-prod)
  use_backend non-prod-cluster-https if is_nonprod_local_sni
  use_backend non-prod-cluster-https if is_nonprod_sni
  use_backend prod-cluster-https if is_prod_local_sni
  use_backend prod-cluster-https if is_prod_sni
  default_backend prod-cluster-https

frontend frontend-http
  bind *:80
  option httplog
  # Cleartext HTTP: no SNI — route on Host header (same hostnames as HTTPS; optional :port at end).
  acl is_nonprod_local_host hdr(host) -m reg -i ^[a-zA-Z0-9-]+\.local\.non-prod\.abbottland\.io(:\d+)?$ # *.local.non-prod.abbottland.io
  acl is_nonprod_host hdr(host) -m reg -i ^[a-zA-Z0-9-]+\.non-prod\.abbottland\.io(:\d+)?$ # *.non-prod.abbottland.io
  acl is_prod_local_host hdr(host) -m reg -i ^[a-zA-Z0-9-]+\.local\.abbottland\.io(:\d+)?$ # *.local.abbottland.io
  acl is_prod_host hdr(host) -m reg -i ^[a-zA-Z0-9-]+\.abbottland\.io(:\d+)?$             # *.abbottland.io (not non-prod)
  use_backend non-prod-cluster-http if is_nonprod_local_host
  use_backend non-prod-cluster-http if is_nonprod_host
  use_backend prod-cluster-http if is_prod_local_host
  use_backend prod-cluster-http if is_prod_host
  default_backend prod-cluster-http

backend prod-cluster-http
  option forwardfor
  server tfpw1 192.168.6.25:30080 check send-proxy-v2
  server tfpw2 192.168.6.26:30080 check send-proxy-v2
  server tfpw3 192.168.6.27:30080 check send-proxy-v2

backend non-prod-cluster-http
  option forwardfor
  server tfnpw1 192.168.6.32:30080 check send-proxy-v2
  server tfnpw2 192.168.6.33:30080 check send-proxy-v2
  server tfnpw3 192.168.6.34:30080 check send-proxy-v2

frontend frontend-https
  bind *:443
  mode tcp
  option tcplog
  tcp-request inspect-delay 5s
  tcp-request content accept if { req_ssl_hello_type 1 }
  # Same SNI ACLs as frontend-plex (this bind is :443).
  acl is_nonprod_local_sni req_ssl_sni -m reg -i ^[a-zA-Z0-9-]+\.local\.non-prod\.abbottland\.io$ # *.local.non-prod.abbottland.io
  acl is_nonprod_sni req_ssl_sni -m reg -i ^[a-zA-Z0-9-]+\.non-prod\.abbottland\.io$ # *.non-prod.abbottland.io
  acl is_prod_local_sni req_ssl_sni -m reg -i ^[a-zA-Z0-9-]+\.local\.abbottland\.io$ # *.local.abbottland.io
  acl is_prod_sni req_ssl_sni -m reg -i ^[a-zA-Z0-9-]+\.abbottland\.io$             # *.abbottland.io (not non-prod)
  use_backend non-prod-cluster-https if is_nonprod_local_sni
  use_backend non-prod-cluster-https if is_nonprod_sni
  use_backend prod-cluster-https if is_prod_local_sni
  use_backend prod-cluster-https if is_prod_sni
  default_backend prod-cluster-https

backend prod-cluster-https
  mode tcp
  server tfpw1 192.168.6.25:30443 send-proxy-v2
  server tfpw2 192.168.6.26:30443 send-proxy-v2
  server tfpw3 192.168.6.27:30443 send-proxy-v2

backend non-prod-cluster-https
  mode tcp
  server tfnpw1 192.168.6.32:30443 send-proxy-v2
  server tfnpw2 192.168.6.33:30443 send-proxy-v2
  server tfnpw3 192.168.6.34:30443 send-proxy-v2
