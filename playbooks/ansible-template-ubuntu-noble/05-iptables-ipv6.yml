---
# iptables legacy mode and disable IPv6 (part of configure-vm).
# Template clones will be Kubernetes nodes; set these once in the template.

- name: Update IP Tables to use legacy mode
  hosts: ansible-template-ubuntu-noble
  become: true
  tasks:
    - name: Ensure iptables uses legacy backend
      ansible.builtin.command: update-alternatives --set iptables /usr/sbin/iptables-legacy

    - name: Verify iptables version
      ansible.builtin.command: iptables --version
      register: iptables_version
      changed_when: false

    - name: Show iptables version
      ansible.builtin.debug:
        msg: "{{ iptables_version.stdout }}"

- name: Disable IPv6 on Kubernetes nodes
  hosts: ansible-template-ubuntu-noble
  become: true
  vars:
    reboot_after_disable: false
  tasks:
    - name: Create sysctl config to disable IPv6
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-disable-ipv6.conf
        content: |
          net.ipv6.conf.all.disable_ipv6 = 1
          net.ipv6.conf.default.disable_ipv6 = 1
        owner: root
        group: root
        mode: '0644'

    - name: Reload sysctl settings
      ansible.builtin.command: sysctl --system

    - name: Reboot the node (if enabled)
      ansible.builtin.reboot:
        msg: "Rebooting to apply IPv6 disablement"
        pre_reboot_delay: 3
        reboot_timeout: 300
      when: reboot_after_disable
