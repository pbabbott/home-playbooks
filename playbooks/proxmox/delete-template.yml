---
# Delete a VM (or template) on Proxmox. Runs on chimaera.
# Stops the VM if running, then destroys it.
# ansible-playbook -e @./vault.yml -e template_id=902 ./playbooks/proxmox/delete-template.yml

- name: Delete template/VM on Proxmox
  hosts: chimaera
  vars:
    template_id: 901
  tasks:
    - name: Stop VM if running
      ansible.builtin.command: qm stop "{{ template_id }}"
      register: stop_result
      changed_when: stop_result.rc == 0
      failed_when: false

    - name: Destroy VM
      ansible.builtin.command: qm destroy "{{ template_id }}"
      register: destroy_result
      changed_when: destroy_result.rc == 0
