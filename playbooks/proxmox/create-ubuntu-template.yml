---
# Copy create-ubuntu-template.sh to Proxmox host and run it.
# Only template_id and template_name are configurable via Ansible.

- name: Create Ubuntu cloud-init template on Proxmox
  hosts: chimaera
  vars:
    template_id: 901
    template_name: "ans-template-ubuntu-noble"
    ci_user: "admin"
    ci_password: "{{ inventoryPasswords.kubernetes_node }}"
  tasks:
    - name: Copy local SSH public key to remote /root/
      ansible.builtin.copy:
        src: "{{ lookup('env', 'HOME') }}/.ssh/id_ed25519.pub"
        dest: /root/id_ed25519.pub
        mode: "0644"

    - name: Copy template creation script to Proxmox host
      ansible.builtin.copy:
        src: create-ubuntu-template.sh
        dest: /root/create-ubuntu-template.sh
        mode: "0755"

    - name: Run create-ubuntu-template script
      ansible.builtin.shell: /root/create-ubuntu-template.sh
      environment:
        TEMPLATE_ID: "{{ template_id }}"
        TEMPLATE_NAME: "{{ template_name }}"
        CIUSER: "{{ ci_user  }}"
        CIPASSWORD: "{{ ci_password }}"
      args:
        executable: /bin/bash
      register: script_result
      changed_when: script_result.rc == 0

    - name: Show script output
      ansible.builtin.debug:
        var: script_result.stdout_lines
      when: script_result.stdout_lines is defined and script_result.stdout_lines | length > 0
