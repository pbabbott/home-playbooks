---
# Create a Proxmox cloud-init template from an Ubuntu cloud image.
# Run against the Proxmox host (e.g. group proxmox_hosts). Terraform clones from
# this template and injects sshkeys/ipconfig per VM; see terraform/docs.
#
# Required: vmid (e.g. 900). Pass with: -e vmid=900
# Optional: template_name, storage, ubuntu_release, memory, cores,
#           template_disk_resize, ipconfig0, ciuser, cipassword,
#           create_ubuntu_template_ssh_key_path (path on Proxmox host),
#           create_ubuntu_template_ssh_key_local_path (path on your workstation, e.g. ~/.ssh/id_ed25519.pub)
#
- name: Create Ubuntu cloud-init template on Proxmox
  hosts: proxmox_hosts
  become: true
  vars:
    # Required: vmid via -e vmid=900. Optional vars via -e or vault; defaults applied in tasks to avoid recursion.
    ubuntu_image_url: "https://cloud-images.ubuntu.com/{{ ubuntu_release | default('jammy') }}/current/{{ ubuntu_release | default('jammy') }}-server-cloudimg-amd64.img"
    image_name: "{{ ubuntu_release | default('jammy') }}-server-cloudimg-amd64.img"
    cipassword: "{{ inventoryPasswords.kubernetes_node }}"
  tasks:
    - name: Require valid vmid
      ansible.builtin.fail:
        msg: "vmid must be a positive integer (e.g. 900). Run with: ansible-playbook ... -e vmid=900"
      when: vmid | default('') | string | trim == '' or not (vmid | string is match('^[0-9]+$'))

    - name: Create work directory for cloud image
      ansible.builtin.file:
        path: "{{ template_work_dir | default('/var/lib/vz/template/cloud') }}"
        state: directory
        mode: "0755"

    - name: Download Ubuntu cloud image
      ansible.builtin.get_url:
        url: "{{ ubuntu_image_url }}"
        dest: "{{ (template_work_dir | default('/var/lib/vz/template/cloud')) }}/{{ image_name }}"
        force: false
        mode: "0644"
      register: image_download

    - name: Create VM
      ansible.builtin.command:
        cmd: >
          qm create {{ vmid }}
          --name {{ template_name | default('ubuntu-cloud') }}
          --memory {{ memory | default(1024) }}
          --cores {{ cores | default(1) }}
          --net0 virtio,bridge=vmbr0
      changed_when: true

    - name: Import cloud image into storage
      ansible.builtin.command:
        cmd: "qm importdisk {{ vmid }} {{ (template_work_dir | default('/var/lib/vz/template/cloud')) }}/{{ image_name }} {{ storage | default('local-lvm') }}"
      changed_when: true

    - name: Attach disk as SCSI 0
      ansible.builtin.command:
        cmd: "qm set {{ vmid }} --scsihw virtio-scsi-pci --scsi0 {{ storage | default('local-lvm') }}:vm-{{ vmid }}-disk-0"
      changed_when: true

    - name: Resize template disk
      ansible.builtin.command:
        cmd: "qm resize {{ vmid }} scsi0 {{ template_disk_resize | default('') }}"
      when: (template_disk_resize | default('')) | length > 0

    - name: Add cloud-init drive
      ansible.builtin.command:
        cmd: "qm set {{ vmid }} --ide2 {{ storage | default('local-lvm') }}:cloudinit"
      changed_when: true

    - name: Set boot order and serial console
      ansible.builtin.command:
        cmd: "qm set {{ vmid }} --boot order=scsi0 --serial0 socket --vga serial0"
      changed_when: true

    - name: Set cloud-init ipconfig0
      ansible.builtin.command:
        cmd: "qm set {{ vmid }} --ipconfig0 {{ ipconfig0 | default('ip=dhcp') }}"
      changed_when: true

    - name: Set cloud-init user
      ansible.builtin.command:
        cmd: "qm set {{ vmid }} --ciuser {{ ciuser }}"
      when: ciuser is defined and ciuser | length > 0

    - name: Set cloud-init password
      ansible.builtin.command:
        cmd: "qm set {{ vmid }} --cipassword {{ cipassword }}"
      when: cipassword is defined and cipassword | length > 0
      no_log: true

    # SSH key: either from local workstation or from path on Proxmox host
    - name: Note when no SSH key will be set
      ansible.builtin.debug:
        msg: "No SSH key variable set. Pass -e create_ubuntu_template_ssh_key_local_path=~/.ssh/id_ed25519.pub (or create_ubuntu_template_ssh_key_path on Proxmox) to inject a key."
      when:
        - (create_ubuntu_template_ssh_key_local_path | default('')) | length == 0
        - (create_ubuntu_template_ssh_key_path | default('')) | length == 0

    - name: Resolve local SSH key path (expand ~)
      ansible.builtin.set_fact:
        ssh_key_local_resolved: "{{ create_ubuntu_template_ssh_key_local_path | replace('~', lookup('env', 'HOME')) }}"
      when: (create_ubuntu_template_ssh_key_local_path | default('')) | length > 0

    - name: Check SSH key exists on workstation
      ansible.builtin.stat:
        path: "{{ ssh_key_local_resolved }}"
      register: ssh_key_local_stat
      delegate_to: localhost
      run_once: true
      when: (create_ubuntu_template_ssh_key_local_path | default('')) | length > 0

    - name: Fail if local SSH key path given but file missing
      ansible.builtin.fail:
        msg: "SSH public key not found on your workstation: {{ ssh_key_local_resolved }}"
      when:
        - (create_ubuntu_template_ssh_key_local_path | default('')) | length > 0
        - not ssh_key_local_stat.stat.exists | default(false)

    - name: Read SSH public key from workstation
      ansible.builtin.slurp:
        src: "{{ ssh_key_local_resolved }}"
      register: ssh_key_from_workstation
      delegate_to: localhost
      run_once: true
      when:
        - (create_ubuntu_template_ssh_key_local_path | default('')) | length > 0
        - ssh_key_local_stat.stat.exists | default(false)

    - name: Deploy SSH public key from workstation to Proxmox host
      ansible.builtin.copy:
        content: "{{ ((hostvars['localhost'] | default({})).get('ssh_key_from_workstation') or hostvars[groups['proxmox_hosts'][0]].get('ssh_key_from_workstation')).content | b64decode }}"
        dest: "{{ (template_work_dir | default('/var/lib/vz/template/cloud')) }}/.sshkey-{{ vmid }}.pub"
        mode: "0644"
      when: (create_ubuntu_template_ssh_key_local_path | default('')) | length > 0

    - name: Confirm SSH key injected into template
      ansible.builtin.debug:
        msg: "SSH key from '{{ create_ubuntu_template_ssh_key_local_path }}' was set in template VMID {{ vmid }}."
      when: (create_ubuntu_template_ssh_key_local_path | default('')) | length > 0

    - name: Check SSH key file exists on Proxmox host
      ansible.builtin.stat:
        path: "{{ create_ubuntu_template_ssh_key_path | default('') }}"
      register: ssh_key_stat
      when: (create_ubuntu_template_ssh_key_path | default('')) | length > 0

    - name: Fail if SSH key path given but file missing
      ansible.builtin.fail:
        msg: "SSH key file not found on Proxmox host: {{ create_ubuntu_template_ssh_key_path | default('') }}"
      when:
        - (create_ubuntu_template_ssh_key_path | default('')) | length > 0
        - not ssh_key_stat.stat.exists | default(false)

    - name: Set cloud-init SSH key from file on Proxmox host (deployed from workstation)
      ansible.builtin.command:
        cmd: "qm set {{ vmid }} --sshkey {{ (template_work_dir | default('/var/lib/vz/template/cloud')) }}/.sshkey-{{ vmid }}.pub"
      when: (create_ubuntu_template_ssh_key_local_path | default('')) | length > 0

    - name: Set cloud-init SSH key from file on Proxmox host (existing path)
      ansible.builtin.command:
        cmd: "qm set {{ vmid }} --sshkey {{ create_ubuntu_template_ssh_key_path | default('') }}"
      when:
        - (create_ubuntu_template_ssh_key_path | default('')) | length > 0
        - (create_ubuntu_template_ssh_key_local_path | default('')) | length == 0
        - ssh_key_stat.stat.exists | default(false)

    - name: Convert VM to template
      ansible.builtin.command:
        cmd: "qm template {{ vmid }}"
      changed_when: true

    - name: Template ready
      ansible.builtin.debug:
        msg: "Template '{{ template_name | default('ubuntu-cloud') }}' (VMID {{ vmid }}) is ready for Terraform clones. Optional: install qemu-guest-agent in clones (e.g. via Ansible)."
